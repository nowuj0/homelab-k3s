apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: database
  name: postgres
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      nodeSelector:
        kubernetes.io/hostname: pi
      containers:
      - name: postgres
        image: postgres:18
        ports:
        - containerPort: 5432
        env:
          - name: POSTGRES_DB
            value: wndnjs
          - name: POSTGRES_USER
            value: wndnjs
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: postgres
                key: password
        volumeMounts:
          - name: postgres-data
            mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres